name: Build Zephyrise

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build macOS app
        run: pnpm run dist

      - name: Upload artifact (mac)
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build Windows app
        run: pnpm run dist --win

      - name: Upload artifact (win)
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/